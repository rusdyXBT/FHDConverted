<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MP4 Clean Uploader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0a0f, #030304);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* container utama – sentral, minimalis */
    .uploader-container {
      max-width: 520px;
      width: 100%;
      background: rgba(12, 10, 14, 0.68);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 65, 95, 0.25);
      border-top: 1px solid rgba(255, 65, 95, 0.4);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 45, 85, 0.08);
      padding: 1.8rem 1.5rem;
      transition: all 0.2s ease;
    }

    /* header simpel */
    .brand {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .icon-marker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #ff2d55, #a00525);
      border-radius: 1.2rem;
      margin-bottom: 0.9rem;
      box-shadow: 0 8px 20px rgba(255, 45, 85, 0.3);
    }

    .icon-marker::before {
      content: "⬤";
      font-size: 1.8rem;
      color: rgba(255,255,240,0.95);
      text-shadow: 0 0 6px rgba(0,0,0,0.3);
      transform: rotate(10deg);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #ffffff, #ffb7c5);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.25rem;
    }

    .sub {
      color: #aa9ea3;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      border-top: 1px dashed rgba(255, 95, 125, 0.4);
      display: inline-block;
      padding-top: 0.4rem;
    }

    /* kartu / panel */
    .card-panel {
      background: rgba(8, 6, 9, 0.55);
      border-radius: 1.5rem;
      padding: 1.3rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(4px);
    }

    .field-label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #cbacb5;
      margin-bottom: 0.5rem;
    }

    input[type="file"] {
      width: 100%;
      background: #0b090c;
      border: 1px solid #2a1e24;
      border-radius: 1rem;
      padding: 0.7rem 0.9rem;
      color: #f0eef0;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 1rem;
    }

    input[type="file"]:hover {
      border-color: #ff3b62;
      background: #100c0f;
    }

    input[type="file"]::file-selector-button {
      background: rgba(255, 45, 85, 0.2);
      border: 1px solid rgba(255, 65, 95, 0.5);
      border-radius: 2rem;
      padding: 0.3rem 0.9rem;
      color: white;
      font-weight: 600;
      margin-right: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }

    input[type="file"]::file-selector-button:hover {
      background: rgba(255, 45, 85, 0.4);
      border-color: #ff2d55;
    }

    button {
      width: 100%;
      background: linear-gradient(105deg, #ff1f48, #b00c2c);
      border: none;
      border-radius: 2rem;
      padding: 0.75rem 0.9rem;
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      color: white;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      margin-top: 0.3rem;
      box-shadow: 0 6px 14px rgba(176, 12, 44, 0.3);
    }

    button:active {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: 0.45;
      transform: none;
      cursor: not-allowed;
      filter: grayscale(0.1);
    }

    /* status bubble */
    .status {
      margin-top: 1.2rem;
      padding: 0.7rem 0.7rem 0.7rem 2rem;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 1.2rem;
      font-size: 0.8rem;
      color: #c7b5bc;
      border-left: 3px solid #ff2d55;
      position: relative;
    }

    .status::before {
      content: "●";
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: #ff3b62;
      text-shadow: 0 0 6px #ff1744;
    }

    .status[data-state="processing"] {
      color: #ffdbe4;
      border-left-color: #ff6381;
    }
    .status[data-state="success"] {
      border-left-color: #2ed15e;
      color: #c3ffd8;
    }
    .status[data-state="success"]::before {
      color: #2ed15e;
    }
    .status[data-state="error"] {
      border-left-color: #ff3355;
      background: rgba(255, 40, 80, 0.12);
      color: #ffc0ce;
    }

    /* sosmed minimal */
    .social-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.2rem;
      margin-top: 2rem;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(20, 15, 18, 0.6);
      padding: 0.4rem 1rem;
      border-radius: 3rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: #e2cfd6;
      text-decoration: none;
      backdrop-filter: blur(6px);
      transition: 0.2s;
      border: 1px solid rgba(255, 75, 105, 0.2);
    }

    .social-link:hover {
      background: rgba(255, 45, 85, 0.2);
      color: white;
      border-color: rgba(255, 75, 105, 0.6);
      transform: translateY(-2px);
    }

    .footer-note {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.65rem;
      color: #5f4e55;
    }

    /* responsive */
    @media (max-width: 480px) {
      .uploader-container {
        padding: 1.2rem;
      }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="uploader-container">
  <div class="brand">
    <div class="icon-marker"></div>
    <h1>Tiktok Clean Uploader</h1>
    <div class="sub">✦ Tools converter mp4 🤙 + Source Code by @RusdyXBT ✦</div>
  </div>

  <div class="card-panel">
    <label class="field-label">📁 Pilih file video (MP4)</label>
    <input type="file" id="fileInput" accept="video/mp4,video/quicktime">

    <button id="patchBtn" disabled>⚡ Patch & Download</button>

    <div id="statusBox" class="status" data-state="idle">⏻ Siap — pilih file MP4</div>
  </div>

  <!-- sosial media sesuai permintaan -->
  <div class="social-links">
    <a class="social-link" href="https://tiktok.com" target="_blank" rel="noopener noreferrer">
      <span>🎵</span> TikTok
    </a>
    <a class="social-link" href="https://github.com/Rusdyxbt" target="_blank" rel="noopener noreferrer">
      <span>🐙</span> GitHub
    </a>
    <a class="social-link" href="https://instagram.com" target="_blank" rel="noopener noreferrer">
      <span>📷</span> Instagram
    </a>
  </div>
  <div class="footer-note">
    ✦ patch mvhd (matrix_b) → 1 | metadata upload friendly ✦
  </div>
</div>

<script>
  (function() {
    // ---------- SHARK METHOD: ubah nilai matrix b menjadi 1 ----------
    const SHARK_MATRIX_B_VALUE = 1;

    // referensi DOM
    const fileInput = document.getElementById('fileInput');
    const patchBtn = document.getElementById('patchBtn');
    const statusDiv = document.getElementById('statusBox');

    let selectedFile = null;

    // helper update status (indonesia)
    function setStatus(text, state = 'idle') {
      statusDiv.textContent = text;
      statusDiv.setAttribute('data-state', state);
    }

    // fungsi patch inti: mencari box moov → mvhd → mengubah matrix[1][0] (offset matrix B)
    function patchSharkMethod(arrayBuffer) {
      const data = new Uint8Array(arrayBuffer);
      const view = new DataView(arrayBuffer);
      const totalLength = data.length;

      // fungsi baca box berdasarkan offset
      function getBoxType(offset) {
        return String.fromCharCode(data[offset], data[offset+1], data[offset+2], data[offset+3]);
      }

      function readBox(offset, endLimit) {
        if (offset + 8 > endLimit) throw new Error('File MP4 rusak: box tidak lengkap.');
        let size = view.getUint32(offset, false);
        const type = getBoxType(offset + 4);
        let headerSize = 8;
        let realSize = size;

        if (size === 1) {
          if (offset + 16 > endLimit) throw new Error(`Box ${type} extended size corrupt.`);
          const high = view.getUint32(offset + 8, false);
          const low = view.getUint32(offset + 12, false);
          realSize = high * 4294967296 + low;
          headerSize = 16;
        } else if (size === 0) {
          realSize = endLimit - offset;
        }

        if (realSize < headerSize || offset + realSize > endLimit) {
          throw new Error(`Ukuran box ${type} tidak valid.`);
        }

        return {
          type,
          offset,
          size: realSize,
          headerSize,
          contentStart: offset + headerSize,
          end: offset + realSize
        };
      }

      function findBox(startOffset, endOffset, wantedType) {
        let off = startOffset;
        while (off + 8 <= endOffset) {
          const box = readBox(off, endOffset);
          if (box.type === wantedType) return box;
          off = box.end;
        }
        return null;
      }

      // cari moov
      const moovBox = findBox(0, totalLength, 'moov');
      if (!moovBox) throw new Error('Tidak ditemukan box "moov". Pastikan file MP4 valid.');

      // cari mvhd di dalam moov
      const mvhdBox = findBox(moovBox.contentStart, moovBox.end, 'mvhd');
      if (!mvhdBox) throw new Error('Box "mvhd" tidak ditemukan (file bukan MP4 standar).');

      // tentukan offset matrix berdasarkan versi mvhd
      const version = data[mvhdBox.contentStart];
      let matrixOffset;
      if (version === 0) {
        // versi 0: ukuran header 108 bytes? matrix mulai offset 44 dari awal mvhd
        matrixOffset = mvhdBox.offset + 44;
      } else if (version === 1) {
        matrixOffset = mvhdBox.offset + 56;
      } else {
        throw new Error(`Versi mvhd tidak didukung: ${version}`);
      }

      // matrix B berada di offset + 4 (elemen baris ke-2 kolom ke-1) = 32bit signed int
      const matrixBOffset = matrixOffset + 4;
      if (matrixBOffset + 4 > mvhdBox.end) {
        throw new Error('mvhd terlalu pendek untuk mengakses display matrix.');
      }

      const previousValue = view.getInt32(matrixBOffset, false);
      // ubah ke nilai SHARK_MATRIX_B_VALUE = 1
      view.setInt32(matrixBOffset, SHARK_MATRIX_B_VALUE, false);

      return {
        offset: matrixBOffset,
        previousValue: previousValue,
        newValue: SHARK_MATRIX_B_VALUE
      };
    }

    // Event: pilih file
    fileInput.addEventListener('change', (e) => {
      const files = e.target.files;
      if (files && files.length > 0) {
        selectedFile = files[0];
        // validasi ekstensi / tipe sederhana
        if (!selectedFile.type.includes('mp4') && !selectedFile.name.toLowerCase().endsWith('.mp4')) {
          setStatus('⚠️ Harap pilih file MP4 yang valid.', 'error');
          patchBtn.disabled = true;
          selectedFile = null;
          return;
        }
        patchBtn.disabled = false;
        setStatus(`✓ Siap: ${selectedFile.name.length > 40 ? selectedFile.name.slice(0,37)+'...' : selectedFile.name}`, 'idle');
      } else {
        selectedFile = null;
        patchBtn.disabled = true;
        setStatus('⏻ Belum ada file dipilih', 'idle');
      }
    });

    // Proses patch + download
    patchBtn.addEventListener('click', async () => {
      if (!selectedFile) {
        setStatus('❌ Pilih file terlebih dahulu.', 'error');
        return;
      }

      setStatus('🔧 Memproses: mencari mvhd & menerapkan patch matrix...', 'processing');
      patchBtn.disabled = true;

      try {
        // baca arrayBuffer dari file
        const arrayBuffer = await selectedFile.arrayBuffer();
        
        // lakukan modifikasi (patch)
        const patchResult = patchSharkMethod(arrayBuffer);
        
        // status info hasil patch (nilai sebelumnya berubah jadi 1)
        setStatus(`✓ matrix_b berubah: ${patchResult.previousValue} → ${patchResult.newValue}. Membuat file siap download.`, 'processing');
        
        // buat blob baru dari arrayBuffer yang sudah dimodifikasi
        const patchedBlob = new Blob([arrayBuffer], { type: selectedFile.type || 'video/mp4' });
        const downloadUrl = URL.createObjectURL(patchedBlob);
        
        // trigger download
        const a = document.createElement('a');
        a.href = downloadUrl;
        // nama file asli + _clean.mp4
        const originalBase = selectedFile.name.replace(/\.[^/.]+$/, '');
        a.download = `${originalBase}_clean.mp4`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        
        // revoke object URL
        URL.revokeObjectURL(downloadUrl);
        
        setStatus(`✅ Sukses! File "${selectedFile.name}" telah dipatch & diunduh.`, 'success');
        // reset agar bisa proses file lain tanpa refresh? tetap bisa pilih file baru
        patchBtn.disabled = false;
        // opsional: reset status pilihan file bisa direset, tapi biarkan file masih terseleksi
        // supaya nyaman user bisa langsung patch ulang file yang sama atau ganti
      } catch (err) {
        console.error(err);
        let errorMsg = err.message || 'Terjadi kesalahan saat memproses MP4.';
        if (errorMsg.includes('moov')) errorMsg = 'Tidak ditemukan struktur moov. Hanya file MP4 standar yang didukung.';
        else if (errorMsg.includes('mvhd')) errorMsg = 'Tidak dapat menemukan mvhd. Pastikan file MP4 valid.';
        setStatus(`❌ Gagal: ${errorMsg}`, 'error');
        patchBtn.disabled = false;
      }
    });

    // handle jika drag and drop tidak disediakan, cukup pastikan tombol kembali aktif jika user pilih file lagi
    // optional: pesan awal
    setStatus('⏻ Siap — pilih file MP4', 'idle');
  })();
</script>
</body>
</html>
